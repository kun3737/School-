<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterpiece Student Portal V8 🔒</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff4081; --bg: #0a0e1a; --glass: rgba(255, 255, 255, 0.08); }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; }
        .main-bg { min-height: 100vh; background: radial-gradient(circle at top, #1a1a2e, #0a0e1a); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 20px; width: 95%; max-width: 850px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.3); color: white; outline: none; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; margin: 5px; transition: 0.3s; }
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; width: 100%; }
        .folder { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; position: relative; border: 1px solid transparent; }
        .folder:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .btn-delete { background: #ff3333; font-size: 10px; padding: 5px 8px; position: absolute; top: 5px; right: 5px; border-radius: 5px; border:none; color:white; }
        
        .result-sheet { background: white; color: #222; padding: 30px; border-radius: 15px; border: 1px solid #ddd; }
        .result-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 15px; }
        .student-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f9f9f9; padding: 15px; border-radius: 10px; font-size: 14px; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th { background: #333; color: white; padding: 12px; }
        .result-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        
        .hidden { display: none !important; }
        @media print { .no-print { display: none !important; } .main-bg { background: white; } }
    </style>
</head>
<body class="main-bg">

    <div id="externalUpload" class="glass-card hidden" style="max-width: 450px; text-align: center; margin-top: 50px;">
        <h2 style="color:var(--accent)">📤 Photo Submission</h2>
        <p>Enter details to upload your picture</p>
        <input type="text" id="extClass" placeholder="Class">
        <input type="text" id="extRoll" placeholder="Roll Number">
        <input type="file" id="extFile" accept="image/*" style="background:none;">
        <button class="btn" style="width:100%; background:#2ecc71;" onclick="submitPhoto()">UPLOAD NOW</button>
    </div>

    <div id="loginSection" class="glass-card" style="max-width: 400px; margin-top: 80px; text-align: center;">
        <h2>ADMIN LOGIN</h2>
        <input type="password" id="passInput" placeholder="Secret Key">
        <button class="btn" style="width:100%" onclick="checkPass()">ENTER</button>
    </div>

    <div id="dashboard" class="hidden" style="width: 100%; max-width: 900px;">
        <div class="no-print" style="display: flex; justify-content: center; flex-wrap: wrap; margin-bottom: 20px;">
            <button class="btn" onclick="showTab('addStudent')">➕ Add Student</button>
            <button class="btn" onclick="showTab('viewData')">📁 Folders</button>
            <button class="btn" onclick="showTab('createResult')">📜 Result</button>
            <button class="btn" style="background:#3498db" onclick="showTab('settings')">⚙️ Settings</button>
        </div>

        <div id="addStudentTab" class="glass-card tab-content hidden">
            <h3>Register Student</h3>
            <input type="text" id="sName" placeholder="Student Name">
            <input type="text" id="fName" placeholder="Father Name">
            <input type="text" id="rollNo" placeholder="Roll No">
            <input type="text" id="sClass" placeholder="Class">
            <input type="text" id="sPhone" placeholder="Phone">
            <textarea id="sAddress" placeholder="Address"></textarea>
            <input type="password" id="sPrivacy" placeholder="Set Privacy Code for this Student">
            <button class="btn" style="width:100%; background:#2ecc71" onclick="saveStudent()">Register</button>
        </div>

        <div id="settingsTab" class="glass-card tab-content hidden">
            <h3>Portal Settings</h3>
            <label>School Logo:</label>
            <input type="file" onchange="updateLogo(this)">
            <hr style="border: 0.5px solid #444; margin: 20px 0;">
            <h3>Photo Upload Link</h3>
            <button class="btn" style="background: #2ecc71;" onclick="generateLink()">Generate Link</button>
            <div id="linkContainer" style="display:none; margin-top:10px;">
                <input type="text" id="linkText" readonly style="color:#00ff00; background:#000;">
                <button class="btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
        </div>

        <div id="createResultTab" class="glass-card tab-content hidden">
            <h3>Generate Result Card</h3>
            <input type="text" id="resClass" placeholder="Class">
            <input type="text" id="resRoll" placeholder="Roll No">
            <select id="examType">
                <option value="First Annual Examination">First Annual</option>
                <option value="Second Annual Examination">Second Annual</option>
            </select>
            <div id="subjectsList">
                <div class="subj-row" style="display: flex; gap: 5px;">
                    <input type="text" placeholder="Subject">
                    <input type="number" placeholder="Total">
                    <input type="number" placeholder="Obtained">
                    <input type="text" placeholder="Grade" style="width: 80px;">
                </div>
            </div>
            <button class="btn" onclick="addSubjectRow()">+ Subject</button>
            <button class="btn" style="background:#2ecc71" onclick="saveResult()">Save Result</button>
        </div>

        <div id="viewDataTab" class="glass-card tab-content hidden">
            <h4 id="folderPath" style="color:var(--accent)">School Root</h4>
            <div id="gridDisplay" class="folder-grid"></div>
        </div>

        <div id="detailViewer" class="glass-card hidden">
            <div class="no-print" style="display: flex; justify-content: space-between;">
                <button id="backBtnGlobal" class="btn" style="background:#444">⬅ Back</button>
                <button class="btn" style="background:#3498db" onclick="window.print()">🖨️ PDF</button>
            </div>
            <div id="detailContent" style="margin-top: 20px;"></div>
        </div>
    </div>

    <script>
        const ADMIN_KEY = "MYSECRET786";
        // Change 'masterDB_V8' to something else for a completely different "website" data.
        const DB_NAME = 'masterDB_V8';
        let db = JSON.parse(localStorage.getItem(DB_NAME)) || { students: [], results: [], logo: null, links: [] };

        window.onload = function() {
            const token = new URLSearchParams(window.location.search).get('token');
            if(token && db.links.includes(token)) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('externalUpload').classList.remove('hidden');
            }
        };

        function checkPass() {
            if(document.getElementById('passInput').value === ADMIN_KEY) {
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                showTab('viewData');
            } else alert("Wrong Password!");
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('detailViewer').classList.add('hidden');
            if(tab === 'addStudent') document.getElementById('addStudentTab').classList.remove('hidden');
            if(tab === 'settings') document.getElementById('settingsTab').classList.remove('hidden');
            if(tab === 'viewData') { document.getElementById('viewDataTab').classList.remove('hidden'); renderClasses(); }
            if(tab === 'createResult') document.getElementById('createResultTab').classList.remove('hidden');
        }

        // PHOTO UPLOAD
        function generateLink() {
            const token = "UP-" + Date.now();
            db.links.push(token); updateDB();
            const url = window.location.origin + window.location.pathname + "?token=" + token;
            document.getElementById('linkText').value = url;
            document.getElementById('linkContainer').style.display = "block";
        }

        function copyLink() {
            const copyText = document.getElementById("linkText");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Link Copied!");
        }

        function submitPhoto() {
            const cls = document.getElementById('extClass').value.toLowerCase();
            const roll = document.getElementById('extRoll').value;
            const file = document.getElementById('extFile').files[0];
            const std = db.students.find(s => s.roll === roll && s.class === cls);

            if(!std) return alert("Student not found!");
            if(!file) return alert("Select File!");

            const reader = new FileReader();
            reader.onload = function(e) {
                std.photo = e.target.result;
                db.links = db.links.filter(t => t !== new URLSearchParams(window.location.search).get('token'));
                updateDB();
                alert("Photo Uploaded Successfully!");
                window.location.href = window.location.origin + window.location.pathname;
            };
            reader.readAsDataURL(file);
        }

        // DATABASE LOGIC
        function saveStudent() {
            const s = {
                name: document.getElementById('sName').value,
                father: document.getElementById('fName').value,
                roll: document.getElementById('rollNo').value,
                class: document.getElementById('sClass').value.toLowerCase(),
                phone: document.getElementById('sPhone').value,
                address: document.getElementById('sAddress').value,
                privacyCode: document.getElementById('sPrivacy').value,
                photo: null
            };
            db.students.push(s); updateDB(); alert("Student Saved!"); showTab('viewData');
        }

        function renderClasses() {
            const grid = document.getElementById('gridDisplay'); grid.innerHTML = "";
            const classes = [...new Set(db.students.map(s => s.class))];
            classes.forEach(c => { grid.innerHTML += `<div class="folder" onclick="renderStudents('${c}')">📁 Class ${c.toUpperCase()}</div>`; });
        }

        function renderStudents(c) {
            const grid = document.getElementById('gridDisplay');
            grid.innerHTML = `<button class="btn" style="grid-column:1/-1; background:#444;" onclick="renderClasses()">⬅ Back</button>`;
            db.students.filter(s => s.class === c).forEach(s => {
                grid.innerHTML += `<div class="folder" onclick="openFolder('${s.roll}','${s.class}')">
                    <button class="btn-delete" onclick="deleteStudent('${s.roll}', event)">X</button>
                    👤 ${s.roll}</div>`;
            });
        }

        function openFolder(roll, cls) {
            const grid = document.getElementById('gridDisplay');
            grid.innerHTML = `<button class="btn" style="grid-column:1/-1; background:#444;" onclick="renderStudents('${cls}')">⬅ Back</button>`;
            grid.innerHTML += `<div class="folder" onclick="checkAccess('${roll}', 'info')">📄 Info</div>`;
            if(db.results.some(r => r.roll === roll && r.class === cls)) {
                grid.innerHTML += `<div class="folder" style="border-color:var(--accent)" onclick="checkAccess('${roll}', 'result')">📜 Result</div>`;
            }
        }

        function checkAccess(roll, type) {
            const s = db.students.find(x => x.roll === roll);
            if(s.privacyCode) {
                const p = prompt("Enter Student Privacy Code:");
                if(p !== s.privacyCode) return alert("Wrong Code!");
            }
            if(type === 'info') viewInfo(roll); else viewResult(roll, s.class);
        }

        function viewInfo(roll) {
            const s = db.students.find(x => x.roll === roll);
            document.getElementById('backBtnGlobal').onclick = () => showTab('viewData');
            document.getElementById('detailContent').innerHTML = `
                <div class="result-sheet" style="color:black">
                    <h2>Student Profile</h2>
                    <img src="${s.photo || ''}" style="width:120px; border-radius:10px; margin-bottom:10px; border:1px solid #ddd;">
                    <p><b>Name:</b> ${s.name}</p><p><b>Father:</b> ${s.father}</p>
                    <p><b>Roll:</b> ${s.roll}</p><p><b>Class:</b> ${s.class.toUpperCase()}</p>
                    <p><b>Address:</b> ${s.address}</p>
                </div>`;
            document.getElementById('viewDataTab').classList.add('hidden');
            document.getElementById('detailViewer').classList.remove('hidden');
        }

        function viewResult(roll, cls) {
            const s = db.students.find(x => x.roll === roll);
            const r = db.results.find(x => x.roll === roll && x.class === cls);
            document.getElementById('backBtnGlobal').onclick = () => showTab('viewData');
            let rows = ""; r.data.forEach(m => { rows += `<tr><td>${m.sub}</td><td>${m.tot}</td><td>${m.ob}</td><td>${m.grd}</td></tr>`; });

            document.getElementById('detailContent').innerHTML = `
                <div class="result-sheet">
                    <div class="result-header">
                        <img src="${db.logo || ''}" style="height:50px">
                        <div><h3>${r.exam}</h3></div>
                    </div>
                    <div style="display:flex; gap:15px; margin-bottom:15px;">
                        <img src="${s.photo || ''}" style="width:80px; height:80px; border-radius:10px; border:1px solid #ddd;">
                        <div class="student-meta" style="flex:1">
                            <div>Name: <b>${s.name}</b></div><div>Roll: <b>${roll}</b></div>
                            <div>Class: <b>${cls.toUpperCase()}</b></div><div>Father: <b>${s.father}</b></div>
                        </div>
                    </div>
                    <table class="result-table"><tr><th>Subject</th><th>Total</th><th>Obtained</th><th>Grade</th></tr>${rows}</table>
                </div>`;
            document.getElementById('viewDataTab').classList.add('hidden');
            document.getElementById('detailViewer').classList.remove('hidden');
        }

        function saveResult() {
            const rc = document.getElementById('resClass').value.toLowerCase();
            const rr = document.getElementById('resRoll').value;
            const rows = document.querySelectorAll('.subj-row');
            let mData = [];
            rows.forEach(row => {
                const i = row.querySelectorAll('input');
                if(i[0].value) mData.push({ sub: i[0].value, tot: i[1].value, ob: i[2].value, grd: i[3].value });
            });
            db.results.push({ class: rc, roll: rr, exam: document.getElementById('examType').value, data: mData });
            updateDB(); alert("Result Saved!"); showTab('viewData');
        }

        function addSubjectRow() {
            const d = document.createElement('div'); d.className="subj-row"; d.style.display="flex"; d.style.gap="5px";
            d.innerHTML = `<input type="text" placeholder="Subject"> <input type="number" placeholder="Total"> <input type="number" placeholder="Obtained"> <input type="text" placeholder="Grade" style="width:80px;">`;
            document.getElementById('subjectsList').appendChild(d);
        }

        function updateLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => { db.logo = e.target.result; updateDB(); alert("Logo Updated!"); };
            reader.readAsDataURL(input.files[0]);
        }

        function updateDB() { localStorage.setItem(DB_NAME, JSON.stringify(db)); }
        function deleteStudent(roll, e) { e.stopPropagation(); if(confirm("Delete student?")) { db.students = db.students.filter(s => s.roll !== roll); updateDB(); renderClasses(); } }
    </script>
</body>
</html>
