<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masterpiece Student Portal V10 🚀</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff4081; --bg: #0a0e1a; --glass: rgba(255, 255, 255, 0.1); }
        body, html { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: white; }
        .main-bg { min-height: 100vh; background: radial-gradient(circle at top, #1a1a2e, #0a0e1a); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 25px; width: 95%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: white; outline: none; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; margin: 5px; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); opacity: 0.9; }
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; margin-top: 15px; width: 100%; }
        .folder { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; position: relative; border: 1px solid transparent; }
        .folder:hover { background: rgba(255,255,255,0.1); border-color: var(--accent); }
        .btn-delete { background: #ff3333; font-size: 10px; padding: 5px 8px; position: absolute; top: 5px; right: 5px; border-radius: 5px; border:none; color:white; cursor: pointer; }
        
        /* Result Styles */
        .result-sheet { background: white; color: #222; padding: 30px; border-radius: 15px; }
        .result-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .student-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #f4f4f4; padding: 15px; border-radius: 10px; font-size: 14px; }
        .result-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .result-table th { background: #333; color: white; padding: 10px; }
        .result-table td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        
        .hidden { display: none !important; }
        @media print { .no-print { display: none !important; } .main-bg { background: white; padding: 0; } .glass-card { border: none; box-shadow: none; background: white; color: black; } }
    </style>
</head>
<body class="main-bg">

    <div id="studentPortal" class="glass-card hidden" style="text-align: center;">
        <h2 style="color:var(--accent)">📤 Photo Upload Portal</h2>
        <p>Enter your details to link your photo to your record.</p>
        <input type="text" id="upClass" placeholder="Enter Class Name (e.g. 10th)">
        <input type="text" id="upRoll" placeholder="Enter Roll Number">
        <input type="file" id="upFile" accept="image/*" style="background:none;">
        <button class="btn" style="width:100%; background:#2ecc71" onclick="handleStudentUpload()">UPLOAD PICTURE</button>
    </div>

    <div id="adminLogin" class="glass-card" style="max-width: 400px; text-align: center; margin-top: 50px;">
        <h2>🔐 Admin Access</h2>
        <input type="password" id="adminPass" placeholder="Enter Secret Code">
        <button class="btn" style="width:100%" onclick="login()">LOGIN</button>
    </div>

    <div id="dashboard" class="hidden" style="width: 100%; max-width: 900px;">
        <div class="no-print" style="text-align: center; margin-bottom: 20px;">
            <button class="btn" onclick="showTab('add')">➕ Add Student</button>
            <button class="btn" onclick="showTab('folders')">📁 View Folders</button>
            <button class="btn" onclick="showTab('result')">📜 Create Result</button>
            <button class="btn" style="background:#3498db" onclick="showTab('settings')">⚙️ Settings</button>
        </div>

        <div id="addTab" class="glass-card tab-content hidden">
            <h3>Register New Student</h3>
            <input type="text" id="sName" placeholder="Student Name">
            <input type="text" id="fName" placeholder="Father Name">
            <input type="text" id="roll" placeholder="Roll Number">
            <input type="text" id="cls" placeholder="Class">
            <button class="btn" style="width:100%; background:#2ecc71" onclick="saveStudent()">SAVE STUDENT</button>
        </div>

        <div id="settingsTab" class="glass-card tab-content hidden">
            <h3>School Settings</h3>
            <input type="file" onchange="updateLogo(this)" id="logoInp">
            <label for="logoInp">Upload School Logo</label>
            <hr style="border:0.5px solid #444; margin:20px 0;">
            <h3>Generate Upload Link</h3>
            <button class="btn" style="background:#2ecc71" onclick="generateLink()">Get New Link</button>
            <div id="linkBox" class="hidden" style="margin-top:15px;">
                <input type="text" id="linkVal" readonly style="color:#00ff00; background:#000; text-align:center;">
                <button class="btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
        </div>

        <div id="resultTab" class="glass-card tab-content hidden">
            <h3>Generate Result Card</h3>
            <input type="text" id="resCls" placeholder="Class">
            <input type="text" id="resRoll" placeholder="Roll No">
            <select id="exam">
                <option value="First Annual Examination">First Annual</option>
                <option value="Second Annual Examination">Second Annual</option>
            </select>
            <div id="subjects">
                <div class="subj-row" style="display:flex; gap:5px;">
                    <input type="text" placeholder="Subject">
                    <input type="number" placeholder="Total">
                    <input type="number" placeholder="Obtained">
                    <input type="text" placeholder="Grade" style="width:80px;">
                </div>
            </div>
            <button class="btn" onclick="addRow()">+ Add Subject</button>
            <button class="btn" style="background:#2ecc71" onclick="saveResult()">SAVE RESULT</button>
        </div>

        <div id="foldersTab" class="glass-card tab-content hidden">
            <h4 id="path" style="color:var(--accent)">Root /</h4>
            <div id="display" class="folder-grid"></div>
        </div>

        <div id="viewer" class="glass-card hidden">
            <div class="no-print">
                <button class="btn" style="background:#444" onclick="showTab('folders')">⬅ Back</button>
                <button class="btn" style="background:#3498db" onclick="window.print()">🖨️ Print PDF</button>
            </div>
            <div id="vContent" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const ADMIN_CODE = "MYSECRET786";
        let db = JSON.parse(localStorage.getItem('PortalDB_V10')) || { students: [], results: [], logo: null, links: [] };

        // 1. ROUTING LOGIC
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (token && db.links.includes(token)) {
                // Link is valid, show ONLY student portal
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('studentPortal').classList.remove('hidden');
            }
        };

        function login() {
            if(document.getElementById('adminPass').value === ADMIN_CODE) {
                document.getElementById('adminLogin').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                showTab('folders');
            } else alert("Wrong Password!");
        }

        // 2. STUDENT UPLOAD
        function handleStudentUpload() {
            const c = document.getElementById('upClass').value.toLowerCase();
            const r = document.getElementById('upRoll').value;
            const file = document.getElementById('upFile').files[0];
            const std = db.students.find(s => s.roll === r && s.cls === c);

            if(!std) return alert("Student not found! Contact Admin.");
            if(!file) return alert("Select a photo!");

            const reader = new FileReader();
            reader.onload = function(e) {
                std.photo = e.target.result;
                // Expire token
                db.links = db.links.filter(t => t !== new URLSearchParams(window.location.search).get('token'));
                updateDB();
                alert("Photo uploaded successfully! Folder updated.");
                window.location.href = window.location.pathname; // Go back to login
            };
            reader.readAsDataURL(file);
        }

        // 3. ADMIN FUNCTIONS
        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
            document.getElementById('viewer').classList.add('hidden');
            document.getElementById(t + 'Tab').classList.remove('hidden');
            if(t === 'folders') renderClasses();
        }

        function generateLink() {
            const t = "TOK-" + Date.now();
            db.links.push(t); updateDB();
            const url = window.location.origin + window.location.pathname + "?token=" + t;
            document.getElementById('linkVal').value = url;
            document.getElementById('linkBox').classList.remove('hidden');
        }

        function copyLink() {
            const el = document.getElementById('linkVal');
            el.select(); navigator.clipboard.writeText(el.value);
            alert("Link Copied!");
        }

        function saveStudent() {
            db.students.push({
                name: document.getElementById('sName').value,
                father: document.getElementById('fName').value,
                roll: document.getElementById('roll').value,
                cls: document.getElementById('cls').value.toLowerCase(),
                photo: null
            });
            updateDB(); alert("Student Registered!"); showTab('folders');
        }

        function renderClasses() {
            const grid = document.getElementById('display'); grid.innerHTML = "";
            document.getElementById('path').innerText = "Root /";
            const classes = [...new Set(db.students.map(s => s.cls))];
            classes.forEach(c => {
                grid.innerHTML += `<div class="folder" onclick="renderStudents('${c}')">📁 Class ${c.toUpperCase()}</div>`;
            });
        }

        function renderStudents(c) {
            const grid = document.getElementById('display'); grid.innerHTML = "";
            document.getElementById('path').innerText = `Root / ${c.toUpperCase()} /`;
            db.students.filter(s => s.cls === c).forEach(s => {
                grid.innerHTML += `<div class="folder" onclick="openFolder('${s.roll}','${s.cls}')">
                    <button class="btn-delete" onclick="delStd('${s.roll}', event)">X</button>
                    👤 ${s.roll}<br><small>${s.name}</small></div>`;
            });
        }

        function openFolder(r, c) {
            const grid = document.getElementById('display'); grid.innerHTML = "";
            document.getElementById('path').innerText = `Root / ${c.toUpperCase()} / Roll ${r}`;
            grid.innerHTML += `<div class="folder" onclick="viewInfo('${r}')">📄 Profile Info</div>`;
            if(db.results.some(res => res.roll === r && res.cls === c)) {
                grid.innerHTML += `<div class="folder" style="border-color:var(--accent)" onclick="viewRes('${r}','${c}')">📜 Result Card</div>`;
            }
        }

        function viewInfo(r) {
            const s = db.students.find(x => x.roll === r);
            document.getElementById('vContent').innerHTML = `
                <div class="result-sheet" style="color:black">
                    <h2>Student Profile</h2>
                    <img src="${s.photo || ''}" style="width:120px; height:120px; border-radius:10px; object-fit:cover; border:1px solid #ddd;">
                    <p><b>Name:</b> ${s.name}</p><p><b>Father:</b> ${s.father}</p>
                    <p><b>Roll:</b> ${s.roll}</p><p><b>Class:</b> ${s.cls.toUpperCase()}</p>
                </div>`;
            document.getElementById('foldersTab').classList.add('hidden');
            document.getElementById('viewer').classList.remove('hidden');
        }

        function viewRes(r, c) {
            const s = db.students.find(x => x.roll === r);
            const res = db.results.find(x => x.roll === r && x.cls === c);
            let rows = ""; res.data.forEach(m => { rows += `<tr><td>${m.s}</td><td>${m.t}</td><td>${m.o}</td><td>${m.g}</td></tr>`; });
            document.getElementById('vContent').innerHTML = `
                <div class="result-sheet">
                    <div class="result-header">
                        <img src="${db.logo || ''}" style="height:50px">
                        <div><h3>${res.exam}</h3></div>
                    </div>
                    <div style="display:flex; gap:15px; margin-bottom:15px;">
                        <img src="${s.photo || ''}" style="width:80px; height:80px; border-radius:10px; object-fit:cover; border:1px solid #ddd;">
                        <div class="student-meta" style="flex:1">
                            <div>Name: <b>${s.name}</b></div><div>Roll: <b>${r}</b></div>
                            <div>Father: <b>${s.father}</b></div><div>Class: <b>${c.toUpperCase()}</b></div>
                        </div>
                    </div>
                    <table class="result-table"><tr><th>Subject</th><th>Total</th><th>Obt</th><th>Grade</th></tr>${rows}</table>
                </div>`;
            document.getElementById('foldersTab').classList.add('hidden');
            document.getElementById('viewer').classList.remove('hidden');
        }

        function saveResult() {
            const rows = document.querySelectorAll('.subj-row');
            let mData = [];
            rows.forEach(row => {
                const i = row.querySelectorAll('input');
                if(i[0].value) mData.push({ s: i[0].value, t: i[1].value, o: i[2].value, g: i[3].value });
            });
            db.results.push({ cls: document.getElementById('resCls').value.toLowerCase(), roll: document.getElementById('resRoll').value, exam: document.getElementById('exam').value, data: mData });
            updateDB(); alert("Result Saved!"); showTab('folders');
        }

        function addRow() {
            const d = document.createElement('div'); d.className="subj-row"; d.style.display="flex"; d.style.gap="5px";
            d.innerHTML = `<input type="text" placeholder="Subject"> <input type="number" placeholder="Total"> <input type="number" placeholder="Obtained"> <input type="text" placeholder="Grade" style="width:80px;">`;
            document.getElementById('subjects').appendChild(d);
        }

        function updateLogo(input) {
            const reader = new FileReader();
            reader.onload = (e) => { db.logo = e.target.result; updateDB(); alert("Logo Updated!"); };
            reader.readAsDataURL(input.files[0]);
        }

        function updateDB() { localStorage.setItem('PortalDB_V10', JSON.stringify(db)); }
        function delStd(r, e) { e.stopPropagation(); if(confirm("Delete?")) { db.students = db.students.filter(x => x.roll !== r); updateDB(); renderClasses(); } }
    </script>
</body>
</html>
